name: CD

on:
  push:
    branches: [ "main" ]

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    
    # Adding permissions
    permissions:
      contents: read
      packages: write

    steps:
    # adding code from repo
    - name: Checkout code
      uses: actions/checkout@v4

    # Docker buildx Configuration
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
        #adding {{github.sha}} for unique id for every deployment for easier rollback
    - name: Build and Push Production Image
      uses: docker/build-push-action@v5
      with:
        context: ./app
        file: ./app/Dockerfile
        push: true
        tags: |
          ghcr.io/${{ github.repository }}/devops-app:latest
          ghcr.io/${{ github.repository }}/devops-app:${{ github.sha }}
